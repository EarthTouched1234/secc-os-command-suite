name: CIRO System State

on:
  push:
    branches: [main]
    paths-ignore:
      - 'memory/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ciro
  cancel-in-progress: false

jobs:
  ciro:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build check
        run: npx tsc -b

      - name: Vite build check
        run: npm run build

      - name: Run CIRO
        run: node ciro/ciro.mjs

      - name: Commit system state
        run: |
          git config user.name "CIRO"
          git config user.email "ciro@secc-os.local"
          git add memory/system_state.json memory/COUNCIL_MEMORY.md

          if git diff --staged --quiet; then
            echo "No system-state change."
          else
            git commit -m "ciro: system state snapshot [ciro-only]"
            git push
          fi
          else
            git commit -m "ciro: system state snapshot [ciro-only]"
            git push
          fi
